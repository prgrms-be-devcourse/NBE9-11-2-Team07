spring:
  application:
    name: mozu
  profiles:
      active: dev

  data:
    redis:
      host: localhost
      port: 6379

  datasource:
    # jdbc:mysql://주소:포트/DB이름
    url: jdbc:mysql://localhost:3306/moju_db?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

jwt:
  secret: thisIsATestSecretKeyForLocalDevelopment123456
  expiration: 86400000  # 24시간